no aaa root
!
hardware counter feature subinterface out layer2
hardware counter feature subinterface in layer2
!
! prompt %H[%D{%T}]%p
!
switchport default mode routed
!
errdisable recovery cause bpduguard
errdisable recovery cause portsec
!
transceiver qsfp default-mode 4x10G
!
service routing protocols model ribd
!
no lldp tlv transmit management-address
no lldp tlv transmit system-description
!
logging buffered 8192 informational
logging console informational
!
hostname switch01.sfo01
ip name-server vrf default 1.1.1.1
ip name-server vrf default 8.8.8.8
dns domain sfmix.org
!
sflow sample 16384
sflow source-interface Loopback0
sflow run
!
username admin privilege 15 secret admin
!
management security
   ssl profile eAPI
      cipher-list HIGH:!eNULL:!aNULL:!MD5:!ADH:!ANULL
      certificate eAPI.crt key eAPI.key
!
management api http-commands
  protocol https ssl profile eAPI
  no shutdown
!
snmp-server contact tech-c@sfmix.org
snmp-server location SFO01
snmp-server community public
!
spanning-tree mode rapid-pvst
spanning-tree vlan-id 100,120,130,140,150,160,997-999 priority 8192
spanning-tree vlan-id 110 priority 24576
!
vlan 100
   name INBAND-MGMT
!
vlan 110
   name INBAND-TRANSIT
!
vlan 120
   name SFO01-MGMT
!
vlan 130
   name SFO02-MGMT
!
vlan 140
   name FMT01-MGMT
!
vlan 150
   name SJC01-MGMT
!
vlan 160
   name SCL01-MGMT
!
vlan 997
   name SFMIX-QUARANTINE
!
vlan 998
   name SFMIX-PEERING
!
vlan 999
   name SFMIX-PEERING-JUMBO
!
banner login
SFMIX switch01.oob.sfo01.sfmix.org
EOF
!
aaa authorization exec default local
!
interface Ethernet1
   description Core: Transport SFO02 via Acme
   mtu 9192
   no switchport
   ip address 10.200.0.0/31
   ip ospf network point-to-point
!
interface Ethernet2
!! PP.A ports 7 & 8 - Some Comment about the patch
   description Mapple (LAG #1)
   no switchport
   channel-group 100 mode active
!
interface Ethernet3
!! PP.A ports 9 & 10 - Some Comment about the patch
   description Mapple (LAG #2)
   no switchport
   channel-group 100 mode active
!
interface Ethernet4
!! PP.A Port 11 & 12 - Some Comment
   description Available
   shutdown
!
interface Ethernet5
!! PP. A Ports 13 &14 -- Pre-patched port
   description Available: 10G-LR
   shutdown
!
 interface Port-Channel100
    description Peer: Mapple (AS64496)
    switchport trunk native vlan 998
    switchport trunk allowed vlan 998-999
    switchport mode trunk
    switchport
!    switchport port-security mac-address maximum 3
!    switchport port-security
!    storm-control broadcast level 0.01
!    storm-control multicast level 0.01
!    spanning-tree bpduguard enable
!
interface Loopback0
   ip address 10.100.1.1/32
!
interface Management1
   ip address 10.10.0.2/24
   ipv6 enable
   ipv6 address auto-config
   ipv6 nd ra rx accept default-route
!
! interface Vlan1
! !
interface Vxlan1
   vxlan source-interface Loopback0
   vxlan udp-port 4789
   vxlan vlan 100 vni 100
   vxlan vlan 110 vni 110
   vxlan vlan 997 vni 997
   vxlan vlan 998 vni 998
   vxlan vlan 999 vni 999
   vxlan flood vtep 10.100.2.1
