# The portal builds the network map itself (mapbuild app + Django-Q2), producing
# the public map.json + private map-links.json into the shared `db` volume — no
# external rsync. Two services share one image + the templated .env (which now
# also carries NETBOX_API_ENDPOINT/TOKEN for the builder): the `portal` web
# server and the `qcluster` background worker that runs the (scheduled +
# on-demand) map build. Kept docker-compose v1 friendly (no long-form depends_on
# conditions); qcluster migrates before it starts so its django_q tables exist.
services:
  portal:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      MAP_OUTPUT: "/app/db/map/map.json"
      MAP_LINKS_OUTPUT: "/app/db/map/map-links.json"
      SFMIX_MAP_LINKS_PATH: "/app/db/map/map-links.json"
    volumes:
      - db:/app/db
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/login/')"]
      interval: 30s
      timeout: 5s
      retries: 3

  qcluster:
    build: .
    restart: unless-stopped
    command: sh -c "python manage.py migrate --noinput && python manage.py qcluster"
    env_file:
      - .env
    environment:
      MAP_OUTPUT: "/app/db/map/map.json"
      MAP_LINKS_OUTPUT: "/app/db/map/map-links.json"
      SFMIX_MAP_LINKS_PATH: "/app/db/map/map-links.json"
    volumes:
      - db:/app/db

volumes:
  db:
