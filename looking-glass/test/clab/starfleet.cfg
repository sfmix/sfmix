no aaa root
!
hostname starfleet
!
username admin privilege 15 secret admin
!
service routing protocols model ribd
!
spanning-tree mode rapid-pvst
!
vlan 998
   name SFMIX-PEERING
!
aaa authorization exec default local
!
interface Ethernet1
   description SFMIX Port
   switchport trunk native vlan 998
   switchport trunk allowed vlan 998
   switchport mode trunk
   switchport
!
interface Loopback0
   ip address 198.51.100.1/32
!
interface Management0
   ip address 172.30.0.11/24
!
interface Vlan998
   description SFMIX Peering LAN
   ip address 10.255.0.11/24
!
ip routing
!
ip route 198.51.100.0/24 Null0
!
router bgp 64497
   router-id 198.51.100.1
   neighbor 10.255.0.1 remote-as 12276
   neighbor 10.255.0.1 description RS1 (sfo01)
   neighbor 10.255.0.2 remote-as 12276
   neighbor 10.255.0.2 description RS2 (sfo02)
   network 198.51.100.0/24
!
end
