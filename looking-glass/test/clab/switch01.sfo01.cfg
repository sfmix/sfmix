no aaa root
!
hostname switch01.sfo01
!
username admin privilege 15 secret admin
!
service routing protocols model ribd
!
spanning-tree mode rapid-pvst
!
vlan 998
   name SFMIX-PEERING
!
aaa authorization exec default local
!
interface Ethernet1
   description Core: Transport to SFO02
   mtu 9192
   no switchport
   ip address 10.200.0.0/31
   ip ospf network point-to-point
!
interface Ethernet2
   description Peer: Mapple (AS64496)
   switchport trunk native vlan 998
   switchport trunk allowed vlan 998
   switchport mode trunk
   switchport
!
interface Loopback0
   ip address 10.100.1.1/32
!
interface Management0
   ip address 172.30.0.2/24
!
interface Vlan998
   description SFMIX Peering LAN
   ip address 10.255.0.1/24
!
interface Vxlan1
   vxlan source-interface Loopback0
   vxlan udp-port 4789
   vxlan vlan 998 vni 998
   vxlan flood vtep 10.100.2.1
!
ip routing
!
router ospf 1
   passive-interface default
   no passive-interface Ethernet1
   network 10.0.0.0/8 area 0.0.0.0
   max-lsa 12000
!
router bgp 12276
   router-id 10.100.1.1
   neighbor peering-lan peer group
   neighbor peering-lan route-reflector-client
   neighbor 10.255.0.2 peer group peering-lan
   neighbor 10.255.0.2 remote-as 12276
   neighbor 10.255.0.2 description RS2 (sfo02)
   neighbor 10.255.0.10 peer group peering-lan
   neighbor 10.255.0.10 remote-as 64496
   neighbor 10.255.0.10 description Mapple
   neighbor 10.255.0.11 peer group peering-lan
   neighbor 10.255.0.11 remote-as 64497
   neighbor 10.255.0.11 description Starfleet
!
end
