# Looking Glass Command Grammar
#
# This file defines the complete command tree. It is embedded into the binary
# at compile time via include_str!() and validated by build.rs.
#
# Node types:
#   keyword children  — named子nodes matched by abbreviation
#   _arg              — positional argument (value captured as target)
#   command           — if present, this node can be executed (produces a Command)
#   help              — description shown by ? and Tab
#   optional          — if true, this keyword can be skipped during parsing
#
# Command fields:
#   verb:            show | ping | traceroute
#   resource:        the Resource enum variant (snake_case)
#   address_family:  ipv4 (default) | ipv6
#   target:          "$arg" to capture the positional argument value

commands:
  show:
    help: Display device information
    children:
      interfaces:
        help: Interface status summary
        command: { verb: show, resource: interfaces_status }
        children:
          status:
            help: Interface status summary (default)
            command: { verb: show, resource: interfaces_status }
          _arg:
            name: "<asn>"
            help: Filter by participant ASN (e.g. 13335, AS13335)
            command: { verb: show, resource: interfaces_status, filter_asn: "$arg" }
      optics:
        help: Transceiver/DOM information
        command: { verb: show, resource: optics }
        children:
          inventory:
            help: Transceiver hardware inventory (vendor/model/serial) — admin only
            command: { verb: show, resource: optics_inventory }
          _arg:
            name: "<asn>"
            help: Filter by participant ASN (e.g. 13335, AS13335)
            command: { verb: show, resource: optics, filter_asn: "$arg" }
      mac:
        help: MAC address table
        command: { verb: show, resource: mac_address_table }
        children:
          address-table:
            help: MAC address table
            command: { verb: show, resource: mac_address_table }
            children:
              vlan:
                help: Filter by VLAN ID
                children:
                  _arg:
                    name: "<vlan>"
                    help: VLAN ID (e.g. 998)
                    command: { verb: show, resource: mac_address_table, filter_vlan: "$arg" }
          vlan:
            help: Filter by VLAN ID
            children:
              _arg:
                name: "<vlan>"
                help: VLAN ID (e.g. 998)
                command: { verb: show, resource: mac_address_table, filter_vlan: "$arg" }
      arp:
        help: ARP table (IPv4 neighbor-to-MAC mapping)
        command: { verb: show, resource: arp }
      ipv6:
        help: IPv6 neighbor table (NDP)
        children:
          neighbors:
            help: IPv6 neighbor table (NDP)
            command: { verb: show, resource: ipv6_neighbors }
      lldp:
        help: LLDP neighbor information
        command: { verb: show, resource: lldp_neighbors }
      participants:
        help: IXP participant list
        command: { verb: show, resource: participants }
        children:
          _arg:
            name: "<asn>"
            help: Show detail for a specific participant ASN (e.g. 13335, AS13335)
            command: { verb: show, resource: participant_detail, target: "$arg" }
      ix-ip-assignments:
        help: Assigned IX IPs with their tenant/ASN
        command: { verb: show, resource: ix_ip_assignments }
        children:
          _arg:
            name: "<asn>"
            help: Filter to a specific participant ASN (e.g. 13335, AS13335)
            command: { verb: show, resource: ix_ip_assignments, filter_asn: "$arg" }
      discovered-neighbors:
        help: ARP/NDP neighbors heard on the IX fabric (with conflicts)
        command: { verb: show, resource: discovered_neighbors }
        children:
          _arg:
            name: "<asn>"
            help: Filter to a specific participant ASN (e.g. 13335, AS13335)
            command: { verb: show, resource: discovered_neighbors, filter_asn: "$arg" }
      netbox:
        help: NetBox cache status
        command: { verb: show, resource: netbox_cache }
      device-cache:
        help: Device state cache status
        command: { verb: show, resource: device_cache }

  ping:
    help: Send ICMP echo to a destination
    children:
      _arg:
        name: "<destination>"
        help: IP address or hostname
        command: { verb: ping, resource: network_reachability, target: "$arg" }

  traceroute:
    help: Trace route to a destination
    children:
      _arg:
        name: "<destination>"
        help: IP address or hostname
        command: { verb: traceroute, resource: network_reachability, target: "$arg" }

  login:
    help: Authenticate via OIDC (opens browser)
    command: { verb: show, resource: login }

  whoami:
    help: Show current identity and permissions
    command: { verb: show, resource: whoami }

  logout:
    help: Drop authentication (return to public tier)
    command: { verb: show, resource: logout }

  help:
    help: Show available commands
    command: { verb: show, resource: help }

  quit:
    help: Disconnect
    builtin: quit

  exit:
    help: Disconnect
    builtin: quit
