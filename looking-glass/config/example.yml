# =============================================================================
# Looking Glass — Example Configuration
# =============================================================================
#
# Copy this file to /etc/looking-glass/config.yml and edit to taste.
# See README.md for full configuration reference.

# ---------------------------------------------------------------------------
# Service identity — shown in banners and MCP server info
# ---------------------------------------------------------------------------
service:
  name: "SFMIX Looking Glass"
  operator: "SFMIX"                       # optional
  operator_url: "https://sfmix.org"       # optional
  peeringdb_ix_id: 60                     # optional, PeeringDB IX ID

# ---------------------------------------------------------------------------
# Site — identifies which IXP site this instance serves
# ---------------------------------------------------------------------------
site:
  name: "sfo02"
  display_name: "200 Paul, San Francisco"  # optional, human-readable

# ---------------------------------------------------------------------------
# Listen addresses — enable/disable and bind each frontend
# ---------------------------------------------------------------------------
listen:
  telnet:
    enabled: true
    bind: "[::]:2023"     # default: [::]:23

  # Uncomment to enable the SSH frontend (requires a host key):
  # ssh:
  #   enabled: true
  #   bind: "[::]:2222"   # default: [::]:2222
  #   host_key: "/etc/looking-glass/ssh_host_ed25519_key"

  # Uncomment to enable the HTTP frontend (REST API + MCP on one port):
  # http:
  #   enabled: true
  #   bind: "[::]:8080"   # default: [::]:8080

# ---------------------------------------------------------------------------
# MCP tool namespace — scopes MCP tool names to this deployment
# ---------------------------------------------------------------------------
# Set this to a short, slug-like identifier for your network or organization.
# It prefixes all MCP tool names: looking_glass__{network_slug}__show_interfaces_status
# This prevents name collisions when an MCP client connects to multiple looking glasses.
#
# network_slug: "sfmix"   # default: "my_network"

# ---------------------------------------------------------------------------
# Authentication — OIDC configuration for SSH cert and MCP header identity
# ---------------------------------------------------------------------------
# Required for SSH and authenticated MCP access. If omitted, only Telnet
# (unauthenticated) and anonymous MCP are available.
#
# auth:
#   oidc:
#     issuer: "https://login.sfmix.org/application/o/looking-glass/"
#     client_id: "looking-glass"
#     scopes: ["openid", "profile", "email", "groups"]
#     group_prefix: "as"                # default: "as"
#                                       # Groups matching "{prefix}{asn}" grant ASN ownership.
#                                       # Example: group "as64500" → owns AS64500.
#     admin_group: "IX Administrators"  # default: "IX Administrators"
#                                       # Members of this group have full read-only access.

# ---------------------------------------------------------------------------
# Network devices — each device is an SSH target for command dispatch
# ---------------------------------------------------------------------------
devices:
  - name: "switch01.sfo02.sfmix.org"
    platform: arista_eos              # arista_eos | nokia_sros
    host: "switch01.sfo02.sfmix.org"
    port: 22                          # default: 22
    username: "looking-glass"
    auth_method: ssh_key              # default: ssh_key (ssh_key | password)
    ssh_key: "/etc/looking-glass/device_key"
    # host_key_fingerprint: "SHA256:..."  # optional — pin device SSH host key
    #                                     # Get with: ssh-keygen -lf <(ssh-keyscan -t ed25519 HOST 2>/dev/null)
    #                                     # If omitted, all host keys are accepted (TOFU model).

  - name: "switch02.fmt01.sfmix.org"
    platform: arista_eos
    host: "switch02.fmt01.sfmix.org"
    port: 22
    username: "looking-glass"
    auth_method: ssh_key
    ssh_key: "/etc/looking-glass/device_key"

  - name: "cr1.sjc01.transit.sfmix.org"
    platform: nokia_sros
    host: "cr1.sjc01.transit.sfmix.org"
    port: 22
    username: "looking-glass"
    auth_method: ssh_key
    ssh_key: "/etc/looking-glass/device_key"

# ---------------------------------------------------------------------------
# BGP sources — route server looking glass backends (BIRDWatcher / bgplgd)
# ---------------------------------------------------------------------------
# Optional. Enables "show sources", "show routes <neighbor>", and
# "show route <prefix>" commands plus /api/v1/bgp/sources, routes, route
# endpoints. Each source is polled on a background timer.
#
# bgp_sources:
#   - name: "rs-linux"
#     display_name: "Route Server (BIRD)"
#     source_type: birdwatcher            # birdwatcher | bgplgd
#     api: "http://mgmt.rs-linux.sfmix.org:29184/"
#     refresh_interval_secs: 60           # default: 60
#
#   - name: "rs-openbsd"
#     display_name: "Route Server (OpenBGPD)"
#     source_type: bgplgd
#     api: "http://mgmt.rs-openbsd.sfmix.org/api/"
#     refresh_interval_secs: 60

# ---------------------------------------------------------------------------
# Rate limits — protect network devices from query floods
# ---------------------------------------------------------------------------
rate_limits:
  global:
    max_concurrent: 10        # max commands in flight across all devices
    commands_per_minute: 60   # sliding window, rejects when exceeded
  per_device:
    max_concurrent: 2         # max concurrent SSH sessions per device
    commands_per_minute: 20   # sliding window per device
  per_user:
    commands_per_minute: 10   # sliding window per user/IP-prefix
                              # Authenticated users keyed by email.
                              # Anonymous users keyed by IP prefix (/24 IPv4, /56 IPv6).

# ---------------------------------------------------------------------------
# Frontend limits — connection-level protection
# ---------------------------------------------------------------------------
# Protects the looking glass itself from connection floods.
# Applied to telnet, SSH, and MCP frontends.
#
# frontend_limits:
#   idle_timeout_secs: 300          # disconnect idle telnet/SSH sessions (default: 300)
#   max_connections: 50             # global max concurrent connections (default: 50)
#   max_connections_per_source: 5   # per source IP prefix (default: 5)
#                                   # Sources grouped by /24 (IPv4) or /56 (IPv6).

# ---------------------------------------------------------------------------
# Participants — ASN-to-port mapping for per-ASN access control
# ---------------------------------------------------------------------------
# Maps ASNs to their physical ports and BGP sessions so the policy engine
# can enforce port ownership. See config/participants.example.yml.
#
# participants:
#   source: file
#   file: "/etc/looking-glass/participants.yml"
#
# NetBox source (future):
# participants:
#   source: netbox
#   url: "https://netbox.sfmix.org/api"
#   token_env: "NETBOX_TOKEN"

# ---------------------------------------------------------------------------
# VLAN visibility — controls which VLANs appear in MAC address table output
# ---------------------------------------------------------------------------
# Public VLANs are visible to all users (anonymous and authenticated).
# All other VLANs are private and only visible to IX Administrators.
#
vlans:
  public: ["998", "999"]        # peering VLANs visible to everyone

# ---------------------------------------------------------------------------
# Policies — command access rules (first-match evaluation)
# ---------------------------------------------------------------------------
# If omitted, a sensible default policy is used:
#   1. Authenticated users: all show/ping/traceroute (port ownership enforced separately)
#   2. Public users: broad show access, ping, traceroute
#   3. Default deny
#
# See config/policies.example.yml for the custom policy file format.
#
# policies:
#   file: "/etc/looking-glass/policies.yml"
