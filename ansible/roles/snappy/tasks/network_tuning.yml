---
- name: Install network tuning sysctl configuration
  become: true
  ansible.builtin.copy:
    content: |
      # High-performance network tuning for snappy speed test server
      # Optimized for gigabit+ throughput

      # TCP buffer sizes (64 MB max for high-speed WAN)
      net.core.rmem_max = 67108864
      net.core.wmem_max = 67108864
      net.core.rmem_default = 16777216
      net.core.wmem_default = 16777216

      # TCP memory tuning
      net.ipv4.tcp_rmem = 4096 1048576 67108864
      net.ipv4.tcp_wmem = 4096 1048576 67108864
      net.ipv4.tcp_mem = 16777216 33554432 67108864

      # BBR congestion control for better throughput on high-latency links
      net.core.default_qdisc = fq
      net.ipv4.tcp_congestion_control = bbr

      # Additional TCP optimizations
      net.ipv4.tcp_slow_start_after_idle = 0
      net.ipv4.tcp_mtu_probing = 1
      net.ipv4.tcp_timestamps = 1
      net.ipv4.tcp_sack = 1
      net.ipv4.tcp_window_scaling = 1
    dest: /etc/sysctl.d/99-snappy-network-tuning.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload sysctl

- name: Load tcp_bbr kernel module
  become: true
  community.general.modprobe:
    name: tcp_bbr
    state: present
    persistent: present

- name: Apply sysctl settings immediately
  become: true
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    sysctl_set: true
    reload: true
  loop:
    - { key: "net.core.rmem_max", value: "67108864" }
    - { key: "net.core.wmem_max", value: "67108864" }
    - { key: "net.core.rmem_default", value: "16777216" }
    - { key: "net.core.wmem_default", value: "16777216" }
    - { key: "net.core.default_qdisc", value: "fq" }
    - { key: "net.ipv4.tcp_congestion_control", value: "bbr" }
    - { key: "net.ipv4.tcp_slow_start_after_idle", value: "0" }
    - { key: "net.ipv4.tcp_mtu_probing", value: "1" }

- name: Set TX queue length on {{ snappy_bgp_interface }}
  become: true
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=Set TX queue length for {{ snappy_bgp_interface }}
      After=network.target

      [Service]
      Type=oneshot
      ExecStart=/sbin/ip link set {{ snappy_bgp_interface }} txqueuelen 10000
      RemainAfterExit=yes

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/snappy-txqueuelen.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd and enable txqueuelen

- name: Enable TX queue length service
  become: true
  ansible.builtin.systemd_service:
    name: snappy-txqueuelen
    enabled: true
    state: started
    daemon_reload: true
