---
- name: Reload sysctl
  become: true
  ansible.builtin.command:
    cmd: sysctl --system
  changed_when: true

- name: Reload systemd and enable txqueuelen
  become: true
  ansible.builtin.systemd_service:
    name: snappy-txqueuelen
    enabled: true
    state: started
    daemon_reload: true

- name: Restart BIRD
  become: true
  ansible.builtin.systemd_service:
    name: bird
    state: restarted

- name: Restart speedtest container
  become: true
  community.general.docker_container:
    name: speedtest
    restart: true

- name: Reload nginx
  become: true
  ansible.builtin.systemd_service:
    name: nginx
    state: reloaded

- name: Restart iperf3
  become: true
  ansible.builtin.systemd_service:
    name: iperf3
    state: restarted
