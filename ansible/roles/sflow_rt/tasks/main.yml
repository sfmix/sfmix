---
- name: "UFW: accept sFlow on OOB"
  become: true
  community.general.ufw:
    rule: allow
    interface_in: oob
    proto: udp
    to_port: 6343

- name: "Sflow-rt: Ensure directories"
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: nobody
    group: nogroup
    mode: u=rwx,go=rx
  with_items:
    - "{{ sflow_rt_store_dir }}"
    - /opt/sflow-rt/etc

- name: "Sflow-rt: Deploy license key"
  become: true
  ansible.builtin.copy:
    content: "{{ sflow_rt_swkey | to_nice_json }}\n"
    dest: /opt/sflow-rt/swkey.json
    owner: nobody
    group: nogroup
    mode: "0644"
  no_log: true

- name: "Sflow-rt: Deploy bgp.js"
  become: true
  ansible.builtin.template:
    src: bgp.js.j2
    dest: /opt/sflow-rt/etc/bgp.js
    owner: root
    group: root
    mode: "0664"

- name: "Sflow-rt: run container: {{ sflow_rt_docker_container }}"
  community.docker.docker_container:
    name: sflow-rt
    image: "{{ sflow_rt_docker_container }}"
    restart_policy: unless-stopped
    network_mode: host
    user: nobody
    command: >-
      -Dixp.syslog.host=127.0.0.1
      -Dixp.bogons=yes
# -Dixp.bgp.router=100.64.0.18
# -Dixp.bgp.as={{ sfmix_sflow_collector_bgp_asn }}
# -Dixp.bgp.id={{ sfmix_sflow_collector_bgp_address }}
# -Dixp.bgp.multipath=yes
# -Dbgp.start=yes
    volumes:
      - "{{ sflow_rt_store_dir }}:/sflow-rt/store"
      - /opt/sflow-rt/swkey.json:/sflow-rt/swkey.json

- name: "Install ~/sfmix/topology.py requirements"
  become: true
  ansible.builtin.apt:
    name: "{{ item }}"
    state: present
  with_items:
    - python3-pyeapi
    - python3-requests
    - systemd-cron

- name: "Place NetBox read-only API token for topology.py"
  become: true
  no_log: true
  ansible.builtin.copy:
    content: "{{ sflow_rt_netbox_api_token }}"
    dest: /home/sfmix/.netbox_api_token
    owner: sfmix
    group: sfmix
    mode: u=rw,go=

- name: "Place ~sfmix/topology.py"
  become: true
  ansible.builtin.template:
    src: topology.py.j2
    dest: /home/sfmix/topology.py
    owner: sfmix
    group: sfmix
    mode: u=rwx,go=

- name: "Run ~sfmix/topology.py every 12 hours"
  become: true
  ansible.builtin.cron:
    name: "SFMIX topology.py"
    user: sfmix
    job: "/home/sfmix/topology.py"
    minute: "0"
    hour: "*/12"

- name: "Import participants.json every 12 hours"
  become: true
  ansible.builtin.cron:
    name: "Import participants.json"
    user: sfmix
    job: >
      curl https://lg.sfmix.org/participants.json |
      curl -d @- -X PUT -H "Content-Type: application/json"
      http://localhost:8008/app/ixp-metrics/scripts/metrics.js/members/json
    minute: "30"
    hour: "*/12"

# ── Weathermap auto-refresh (metro-ring from discovered LLDP topology) ──────
# Rebuilds the Grafana weathermap from sflow-rt /topology/json (the LLDP graph
# topology.py publishes) + live interface speeds, and pushes it to Grafana.
# Runs 15 min after topology.py so the topology is fresh.
- name: "Weathermap: install graphviz (layout engine)"
  become: true
  tags: [weathermap_cron]
  ansible.builtin.apt:
    name: graphviz
    state: present

- name: "Weathermap: place ~sfmix/weathermap_layouts.py"
  become: true
  tags: [weathermap_cron]
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../scripts/weathermap_layouts.py"
    dest: /home/sfmix/weathermap_layouts.py
    owner: sfmix
    group: sfmix
    mode: u=rwx,go=

- name: "Weathermap: place Grafana service-account token"
  become: true
  tags: [weathermap_cron]
  no_log: true
  ansible.builtin.copy:
    content: "{{ grafana_weathermap_sa_token }}"
    dest: /home/sfmix/.grafana_weathermap_token
    owner: sfmix
    group: sfmix
    mode: u=rw,go=

- name: "Weathermap: refresh from topology every 12 hours"
  become: true
  tags: [weathermap_cron]
  ansible.builtin.cron:
    name: "SFMIX weathermap refresh"
    user: sfmix
    job: >-
      GRAFANA_TOKEN=$(cat /home/sfmix/.grafana_weathermap_token)
      /home/sfmix/weathermap_layouts.py refresh
      '{{ weathermap_dashboard_uid }}' '{{ weathermap_dashboard_title }}'
      '{{ weathermap_dashboard_folder_uid }}' {{ weathermap_layout }}
      >> /home/sfmix/weathermap_refresh.log 2>&1
    minute: "15"
    hour: "*/12"

# NOTE: the network-map structure builder no longer runs here. It moved into the
# portal (portal/mapbuild + Django-Q2), which builds map.json + map-links.json
# directly from NetBox on a schedule — no eAPI/sflow, no rsync to the portal.
# See network-map/ARCHITECTURE.md and portal/README.
