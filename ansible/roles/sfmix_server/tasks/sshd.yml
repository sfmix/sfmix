---
- name: Detect OpenSSH server version
  become: true
  ansible.builtin.shell:
    cmd: "sshd -V 2>&1 | sed -n 's/.*OpenSSH_\\([0-9]*\\.[0-9]*\\).*/\\1/p' | head -1"
  register: _sshd_version
  changed_when: false

- name: Configure sshd MaxStartups
  become: true
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^MaxStartups\s+'
    line: "MaxStartups 30:10:80"
    validate: sshd -t -f %s
  notify: Restart sshd

- name: Configure sshd PerSourceMaxStartups
  become: true
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^PerSourceMaxStartups\s+'
    line: "PerSourceMaxStartups 10"
    validate: sshd -t -f %s
  when: _sshd_version.stdout | length > 0 and _sshd_version.stdout is version('9.2', '>=')
  notify: Restart sshd

- name: Configure sshd PerSourcePenaltyExemptList
  become: true
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^PerSourcePenaltyExemptList\s+'
    line: "PerSourcePenaltyExemptList {{ ixp_admin_source_subnets | join(',') }}"
    validate: sshd -t -f %s
  when: _sshd_version.stdout | length > 0 and _sshd_version.stdout is version('9.8', '>=')
  notify: Restart sshd
