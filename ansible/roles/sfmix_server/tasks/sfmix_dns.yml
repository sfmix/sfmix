---
- name: Gather service facts
  become: true
  ansible.builtin.service_facts:

- name: Stop/disable systemd-resolved
  become: true
  ansible.builtin.systemd_service:
    name: systemd-resolved.service
    enabled: false
    masked: true
    state: stopped
  when:
    - "'systemd-resolved.service' in ansible_facts.services"
    - "ansible_facts.services['systemd-resolved.service']['status'] != 'not-found'"

- name: Remove /etc/resolv.conf (symlink or managed by another service)
  become: true
  ansible.builtin.file:
    path: /etc/resolv.conf
    state: absent

- name: Create /etc/resolv.conf
  become: true
  ansible.builtin.copy:
    dest: /etc/resolv.conf
    content: |
      search sfmix.org
      {% for recursor in sfmix_server_dns_recursors %}
      nameserver {{ recursor }}
      {% endfor %}
    owner: root
    group: root
    mode: ug=rw,o=r
