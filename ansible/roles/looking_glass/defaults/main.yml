---
looking_glass_version: ""
looking_glass_github_repo: sfmix/sfmix

# Binary source (temporary local-build mode) ───────────────────────────
# During active development we deploy locally-built musl binaries instead
# of GitHub Releases (Actions can be slow). Flip back to the Releases path
# by re-enabling the commented-out get_url task in tasks/main.yml.
#
# looking_glass_local_build: run `cargo build` on the Ansible control node
#   before copying (set false if you build the binaries yourself).
# looking_glass_local_bin_dir: directory ON THE CONTROL NODE holding the
#   freshly-built musl binaries (lg-server, lg-cli, lg-http).
looking_glass_local_build: true
looking_glass_local_src_dir: "{{ playbook_dir }}/../looking-glass"
looking_glass_local_bin_dir: "{{ looking_glass_local_src_dir }}/target/x86_64-unknown-linux-musl/release"
looking_glass_bind_address: "0.0.0.0"
looking_glass_telnet_enabled: false
looking_glass_telnet_port: 2023
looking_glass_ssh_enabled: false
looking_glass_ssh_port: 2222
looking_glass_user: looking-glass
looking_glass_group: looking-glass
looking_glass_config_dir: /etc/looking-glass
looking_glass_device_username: looking-glass
looking_glass_device_auth_method: password
looking_glass_devices: []

# Device state cache
looking_glass_device_cache_poll_interval_secs: 30
looking_glass_device_cache_ttl_default: 60
looking_glass_device_cache_ttl_optics: 15
looking_glass_device_cache_ttl_interfaces: 30
looking_glass_device_cache_ttl_lldp: 120
looking_glass_device_cache_ttl_mac: 30
# MAC-table store (first/last-seen + last-known entries, persisted across restarts)
looking_glass_mac_table_state_file: /var/lib/looking-glass/mac-table.json
looking_glass_mac_table_retention_secs: 604800

# Discovered ARP/NDP neighbors (polled from the lg-neighborhood-watch sensor).
# Leave looking_glass_discovered_sensor_url unset to disable the discovered block
# entirely. Set it to the sensor's HTTP base URL on the route server, e.g.
#   looking_glass_discovered_sensor_url: "http://rs-linux.sfmix.org:29185"
looking_glass_discovered_poll_interval_secs: 60
looking_glass_discovered_state_file: /var/lib/looking-glass/discovered-neighbors.json

# RPC settings
looking_glass_rpc_bind: "127.0.0.1:9090"

# HTTP frontend
looking_glass_http_enabled: false
looking_glass_http_port: 8080
looking_glass_http_bind: "127.0.0.1"
looking_glass_network_slug: "my_network"

# OIDC auth (optional — set looking_glass_oidc_enabled: true to enable)
looking_glass_oidc_enabled: false
looking_glass_oidc_issuer: ""
looking_glass_oidc_client_id: ""
looking_glass_oidc_device_auth_endpoint: ""
looking_glass_oidc_token_endpoint: ""
looking_glass_oidc_jwks_uri: ""
looking_glass_oidc_group_prefix: "as"
looking_glass_oidc_admin_group: "IX Administrators"
looking_glass_oidc_cert_lifetime_secs: 43200
