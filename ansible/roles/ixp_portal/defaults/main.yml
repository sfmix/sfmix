---
ixp_portal_domain: portal.sfmix.org
ixp_portal_install_dir: /opt/ixp_portal
ixp_portal_user: sfmix
ixp_portal_group: sfmix
ixp_portal_listen_port: 8000

# OIDC (Authentik)
ixp_portal_oidc_client_id: portal
ixp_portal_oidc_provider_url: "https://login.sfmix.org/application/o/portal"

# Data source (NetBox)
ixp_portal_netbox_url: "https://netbox.sfmix.org"

# Looking Glass REST API
ixp_portal_looking_glass_url: "https://lg-ng.sfmix.org"

# Prometheus — time-series backend for participant traffic charts (queried
# server-side by the portal; never exposed to the browser).
ixp_portal_prometheus_url: "http://metrics.sfo02.sfmix.org:9090"

# Prometheus metrics — CIDRs allowed to scrape /metrics/
ixp_portal_prometheus_trusted_networks: "127.0.0.0/8,::1/128"

# Certbot
ixp_portal_certbot_email: "{{ ixp_primary_tech_contact_email }}"
