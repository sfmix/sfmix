---
- name: Reload bgpd
  become: true
  ansible.builtin.service:
    name: bgpd
    state: reloaded

- name: Restart bgpd
  become: true
  ansible.builtin.service:
    name: bgpd
    state: restarted

- name: Restart httpd
  become: true
  ansible.builtin.service:
    name: httpd
    state: reloaded

- name: Restart bgplgd
  become: true
  ansible.builtin.service:
    name: bgplgd
    state: restarted

# OpenBSD syslogd needs a full restart (not SIGHUP reload) to pick up loghost
# (remote forwarding) changes.
- name: Restart syslogd
  become: true
  ansible.builtin.service:
    name: syslogd
    state: restarted
