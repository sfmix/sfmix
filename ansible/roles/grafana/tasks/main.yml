---
- name: "Grafana: ensure directory"
  become: true
  ansible.builtin.file:
    path: /opt/grafana
    state: directory
    owner: nobody
    mode: ug=rwx,o=rx

- name: "Create a dhparams file"
  become: true
  community.crypto.openssl_dhparam:
    path: /etc/ssl/certs/dhparam.pem
    size: 2048

- name: "Firewall: Allow HTTP(S)"
  become: true
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
  loop:
    - http
    - https

- name: "Install HTTPS/Nginx Reverse Proxy"
  become: true
  block:
    - name: "Install certbox and nginx"
      ansible.builtin.include_role:
        name: "{{ item }}"
      loop:
        - geerlingguy.certbot
        - geerlingguy.nginx
      vars:
        certbot_admin_email: "{{ ixp_primary_tech_contact_email }}"
        certbot_create_if_missing: true
        certbot_create_standalone_stop_services: ["nginx.service"]
        certbot_certs:
          - domains:
              - "{{ grafana_domain }}"
        nginx_remove_default_vhost: true
        nginx_vhosts:
          - listen: "80"
            server_name: "_"
            return: "301 https://$host$request_uri"
          - listen: "443 ssl http2"
            server_name: "{{ grafana_domain }}"
            extra_parameters: |
              ssl_certificate /etc/letsencrypt/live/{{ grafana_domain }}/fullchain.pem;
              ssl_certificate_key /etc/letsencrypt/live/{{ grafana_domain }}/privkey.pem;
              ssl_dhparam /etc/ssl/certs/dhparam.pem;
              location /faceplates/ {
                alias /opt/grafana/faceplates/;
                add_header Cache-Control "public, max-age=3600";
              }
              location / {
                proxy_pass http://127.0.0.1:3000;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
              }

# ── Network Weathermap NG (allamiro fork) ────────────────────────────────
# Unsigned community plugin, manually pinned. Replaces the archived
# knightss27-weathermap-panel, which crashes under Grafana 11+/React 19
# (ReactDOM.findDOMNode removed). Installed into the mounted plugins volume
# and allow-listed via GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS above.
- name: "Grafana: Weathermap NG plugin (pinned unsigned install)"
  become: true
  vars:
    wm_dir: "/opt/grafana/plugins/{{ grafana_weathermap_plugin_id }}"
  block:
    - name: "Weathermap: read installed plugin.json (if any)"
      ansible.builtin.slurp:
        src: "{{ wm_dir }}/plugin.json"
      register: wm_installed
      failed_when: false
      changed_when: false
    - name: "Weathermap: download pinned release (checksum-verified)"
      ansible.builtin.get_url:
        url: "{{ grafana_weathermap_url }}"
        dest: "/opt/grafana/{{ grafana_weathermap_plugin_id }}-{{ grafana_weathermap_version }}.zip"
        checksum: "sha256:{{ grafana_weathermap_sha256 }}"
        owner: nobody
        mode: ug=rw,o=r
      register: wm_download
      when: >-
        wm_installed.content is not defined or
        ('"version": "' ~ grafana_weathermap_version ~ '"') not in (wm_installed.content | b64decode)
    - name: "Weathermap: remove stale plugin dir before extract"
      ansible.builtin.file:
        path: "{{ wm_dir }}"
        state: absent
      when: wm_download is changed
    - name: "Weathermap: extract plugin into volume"
      ansible.builtin.unarchive:
        src: "/opt/grafana/{{ grafana_weathermap_plugin_id }}-{{ grafana_weathermap_version }}.zip"
        dest: /opt/grafana/plugins
        remote_src: true
        owner: nobody
        group: nogroup
      when: wm_download is changed

- name: "Grafana: run grafana-image-renderer container"
  community.docker.docker_container:
    name: grafana-renderer
    image: "{{ grafana_renderer_image }}"
    restart_policy: unless-stopped
    network_mode: host
    env:
      ENABLE_METRICS: "false"
      RENDERING_MODE: "default"
      HTTP_PORT: "8081"
      AUTH_TOKEN: "{{ grafana_renderer_token }}"

- name: "Grafana: run grafana/grafana container"
  community.docker.docker_container:
    name: grafana
    image: grafana/grafana:13.1.0
    restart_policy: unless-stopped
    network_mode: host
    volumes:
      - /opt/grafana:/var/lib/grafana
    user: nobody
    env:
      GF_INSTALL_PLUGINS: "esnet-matrix-panel"
      GF_RENDERING_SERVER_URL: "http://127.0.0.1:8081/render"
      GF_RENDERING_CALLBACK_URL: "http://127.0.0.1:3000/"
      GF_RENDERING_RENDERER_TOKEN: "{{ grafana_renderer_token }}"
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: "{{ grafana_weathermap_plugin_id }}"
      GF_LIVE_ALLOWED_ORIGINS: "https://{{ grafana_domain }}"
      GF_SECURITY_ADMIN_PASSWORD: "{{ grafana_admin_password }}"
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_SERVER_DOMAIN: "{{ grafana_domain }}"
      GF_SERVER_HTTP_PORT: "3000"
      GF_SERVER_ROOT_URL: "https://{{ grafana_domain }}"
      GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
      GF_AUTH_GENERIC_OAUTH_NAME: "Authentik"
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: "grafana"
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: "{{ grafana_oauth_client_secret }}"
      GF_AUTH_GENERIC_OAUTH_SCOPES: "openid profile email groups"
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: "https://login.sfmix.org/application/o/authorize/"
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: "https://login.sfmix.org/application/o/token/"
      GF_AUTH_GENERIC_OAUTH_API_URL: "https://login.sfmix.org/application/o/userinfo/"
      GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: "contains(groups[*], 'IX Administrators') && (contains(groups[*], 'authentik Admins') && 'GrafanaAdmin' || 'Admin') || ''"
      GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_STRICT: "true"
      GF_AUTH_GENERIC_OAUTH_ALLOW_ASSIGN_GRAFANA_ADMIN: "true"
      GF_DATABASE_WAL: "true"

- name: "Grafana Loki: Create directory"
  become: true
  tags: [loki]
  ansible.builtin.file:
    path: /opt/loki
    state: directory
    owner: 10001
    group: 10001
    mode: ug=rwx,o=rx
- name: "Grafana Loki: Template loki-config.yaml"
  become: true
  tags: [loki]
  ansible.builtin.template:
    src: loki-config.yaml.j2
    dest: /opt/loki/loki-config.yaml
    owner: 10001
    group: 10001
    mode: ug=rw,o=r
  notify: "Restart loki docker container"
- name: "Grafana Loki: Template promtail-config.yaml"
  become: true
  tags: [loki]
  ansible.builtin.template:
    src: promtail-config.yaml.j2
    dest: /opt/loki/promtail-config.yaml
    owner: 10001
    group: 10001
    mode: ug=rw,o=r
  notify: "Restart promtail docker container"
- name: "Grafana Loki: Template syslog-ng.conf"
  become: true
  tags: [loki, hostmap]
  ansible.builtin.template:
    src: syslog-ng.conf.j2
    dest: /opt/loki/syslog-ng.conf
    owner: root
    group: root
    mode: ug=rw,o=r
  notify: "Restart syslog-ng docker container"
- name: "Grafana Loki: Run loki"
  become: true
  tags: [loki]
  community.docker.docker_container:
    name: loki
    image: "{{ grafana_loki_image }}"
    restart_policy: unless-stopped
    network_mode: host
    volumes:
      - /opt/loki:/opt/loki
    command: "-config.file=/opt/loki/loki-config.yaml"
- name: "Grafana Loki: Run promtail"
  become: true
  tags: [loki]
  community.docker.docker_container:
    name: promtail
    image: "{{ grafana_promtail_image }}"
    restart_policy: unless-stopped
    network_mode: host
    volumes:
      - /opt/loki:/opt/loki
    command: "-config.file=/opt/loki/promtail-config.yaml"
- name: "Grafana Loki: Ensure host-map.csv exists for syslog-ng add-contextual-data"
  become: true
  tags: [loki, hostmap]
  ansible.builtin.copy:
    content: ""
    dest: /opt/loki/host-map.csv
    force: false          # never clobber the syncer-generated map
    owner: root
    group: root
    mode: ug=rw,o=r
- name: "Grafana Loki: Run syslog-ng"
  become: true
  tags: [loki, hostmap]
  community.docker.docker_container:
    name: syslog-ng
    image: "{{ grafana_syslog_ng_image }}"
    restart_policy: unless-stopped
    network_mode: host
    volumes:
      - /opt/loki/syslog-ng.conf:/etc/syslog-ng/syslog-ng.conf
      # Mount the dir (not the file) so the syncer's atomic replace is visible
      # inside the container on reload.
      - /opt/loki:/opt/loki

# ── NetBox -> syslog-ng canonical host-map syncer (systemd timer) ──────
- name: "Grafana Loki: Install netbox host-map syncer"
  become: true
  tags: [loki, hostmap]
  ansible.builtin.copy:
    src: netbox_syslog_hostmap.py
    dest: /opt/loki/netbox_syslog_hostmap.py
    owner: root
    group: root
    mode: ug=rwx,o=rx
- name: "Grafana Loki: Template host-map syncer env (NetBox creds)"
  become: true
  tags: [loki, hostmap]
  ansible.builtin.template:
    src: netbox-hostmap.env.j2
    dest: /opt/loki/netbox-hostmap.env
    owner: root
    group: root
    mode: ug=rw,o=        # contains an API token
- name: "Grafana Loki: Install host-map sync systemd units"
  become: true
  tags: [loki, hostmap]
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "/etc/systemd/system/{{ item }}"
    owner: root
    group: root
    mode: ug=rw,o=r
  loop:
    - netbox-hostmap-sync.service
    - netbox-hostmap-sync.timer
  notify: "Reload systemd"
- name: "Grafana Loki: Enable host-map sync timer"
  become: true
  tags: [loki, hostmap]
  ansible.builtin.systemd_service:
    name: netbox-hostmap-sync.timer
    enabled: true
    state: started
    daemon_reload: true
