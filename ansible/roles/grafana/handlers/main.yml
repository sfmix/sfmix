- name: "Restart syslog-ng docker container"
  become: true
  community.docker.docker_container:
    name: syslog-ng
    state: started
    restart: true
- name: "Restart loki docker container"
  become: true
  community.docker.docker_container:
    name: loki
    state: started
    restart: true
- name: "Restart promtail docker container"
  become: true
  community.docker.docker_container:
    name: promtail
    state: started
    restart: true
- name: "Reload systemd"
  become: true
  ansible.builtin.systemd_service:
    daemon_reload: true
