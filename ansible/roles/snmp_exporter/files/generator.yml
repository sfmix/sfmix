# snmp_exporter generator input for the committed snmp.yml.j2.
#
# Regenerate with:
#   cd ansible/roles/snmp_exporter/files
#   mkdir -p mibs && cp /var/lib/mibs/ietf/* /var/lib/mibs/iana/* mibs/
#   # plus the vendor PDU MIBs (not in the base set):
#   #   Sentry3-MIB  (ServerTech Switched CDU, e.g. circitor or netdisco-mibs)
#   #   Sentry4-MIB  (ServerTech Switched PDU, e.g. librenms mibs/sentry)
#   #   PDU2-MIB     (Raritan, e.g. librenms mibs/raritan)
#   docker run --rm -v "$PWD:/opt/" prom/snmp-generator generate --no-fail-on-parse-errors
# then re-apply the Jinja auth block in templates/snmp.yml.j2
# (community: SNMP_COMMUNITY_PLACEHOLDER -> {{ sfmix_snmp_community }}).
# (--no-fail-on-parse-errors sidesteps a benign netsnmp quirk in stock
#  SNMPv2-PDU; both PDU modules still resolve fully.)
auths:
  sfmix_v2c:
    version: 2
    community: SNMP_COMMUNITY_PLACEHOLDER
modules:
  # Interface counters/status for all ports (Ethernet, Port-Channel, ...)
  if_mib:
    walk:
      - sysUpTime
      - interfaces
      - ifXTable
    lookups:
      - source_indexes: [ifIndex]
        lookup: ifAlias
      - source_indexes: [ifIndex]
        lookup: ifDescr
      - source_indexes: [ifIndex]
        lookup: ifName
    overrides:
      ifAlias:
        type: DisplayString
      ifDescr:
        type: DisplayString
      ifName:
        type: DisplayString
      ifType:
        type: EnumAsInfo
  # Chassis health: ENTITY-SENSOR (temps, fans, PSUs, transceiver DOM on EOS)
  # and HOST-RESOURCES (CPU load, memory/storage).
  eos_health:
    walk:
      - entPhySensorTable
      - hrProcessorLoad
      - hrStorageTable
    lookups:
      - source_indexes: [entPhysicalIndex]
        lookup: entPhysicalName
      - source_indexes: [hrStorageIndex]
        lookup: hrStorageDescr
    overrides:
      entPhysicalName:
        type: DisplayString
      hrStorageDescr:
        type: DisplayString
      entPhySensorType:
        type: EnumAsInfo
      entPhySensorOperStatus:
        type: EnumAsInfo

  # ServerTech — the fleet is MIXED: older "Sentry Switched CDU" units answer
  # the Sentry3 tree (1718.3), while "Sentry Switched PDU" units answer Sentry4
  # (1718.4). NetBox can't tell them apart (same manufacturer/model), so this
  # one module walks BOTH trees; each device answers only its own and the
  # pdu.rules `or` picks whichever is present. Neither meters per-outlet
  # current — outlets are on/off only. Units are baked into the OIDs (see
  # pdu.rules for the ×scale to base SI).
  pdu_servertech:
    walk:
      # ── Sentry3 (1718.3) — Switched CDU infeed table ──
      - towerName            # 1718.3.2.1.1.3  (lookup label)
      - infeedID             # 1718.3.2.2.1.2
      - infeedName           # 1718.3.2.2.1.3  (human label)
      - infeedStatus         # 1718.3.2.2.1.5  (enum)
      - infeedLoadValue      # 1718.3.2.2.1.7  (current, centi-A)
      - infeedCapacity       # 1718.3.2.2.1.10 (A)
      - infeedVoltage        # 1718.3.2.2.1.11 (deci-V)
      - infeedPower          # 1718.3.2.2.1.12 (W)
      - infeedApparentPower  # 1718.3.2.2.1.13 (VA)
      - infeedPowerFactor    # 1718.3.2.2.1.14 (centi)
      - infeedEnergy         # 1718.3.2.2.1.16 (deci-kWh)
      - outletID             # 1718.3.2.3.1.2  (per-outlet id "A1")
      - outletStatus         # 1718.3.2.3.1.5  (per-outlet on/off, numeric 0/1)
      # ── Sentry4 (1718.4) — Switched PDU input-cord/line/phase telemetry ──
      # outletName/outletStatus above collide with nothing here (st4* prefix).
      - st4UnitName                 # unit name "Primary" (lookup)
      - st4InputCordName            # cord name "Primary_Cord_A" (human label)
      - st4InputCordState           # on/off (enum)
      - st4InputCordActivePower     # W
      - st4InputCordApparentPower   # VA
      - st4InputCordPowerFactor     # centi
      - st4InputCordEnergy          # deci-kWh
      - st4InputCordCurrentCapacity # A
      - st4LineCurrent              # centi-A (per line; single-phase here)
      - st4PhaseVoltage             # deci-V
      - st4OutletName               # per-outlet name (human)
      - st4OutletState              # per-outlet on/off (numeric: unknown0 on1 off2)
    lookups:
      # Sentry3
      - source_indexes: [towerIndex, infeedIndex]
        lookup: infeedName
      - source_indexes: [towerIndex]
        lookup: towerName
      - source_indexes: [towerIndex, infeedIndex, outletIndex]
        lookup: outletID
      # Sentry4 — cord name rides onto cord/line/phase metrics (subset index)
      - source_indexes: [st4UnitIndex, st4InputCordIndex]
        lookup: st4InputCordName
      - source_indexes: [st4UnitIndex, st4InputCordIndex, st4OutletIndex]
        lookup: st4OutletName
      - source_indexes: [st4UnitIndex]
        lookup: st4UnitName
    overrides:
      towerName: {type: DisplayString}
      infeedID: {type: DisplayString}
      infeedName: {type: DisplayString}
      infeedStatus: {type: EnumAsInfo}
      outletID: {type: DisplayString}
      st4UnitName: {type: DisplayString}
      st4InputCordName: {type: DisplayString}
      st4OutletName: {type: DisplayString}
      st4InputCordState: {type: EnumAsInfo}
  # Raritan PX3 (PDU2-MIB, enterprise 13742.6) — inlet sensor telemetry.
  # Readings are unsigned ints scaled by inletSensorDecimalDigits (walked, so
  # pdu.rules scales dynamically). sensorType is an integer index kept NUMERIC
  # on the series (rmsCurrent=1, rmsVoltage=4, activePower=5, apparentPower=6,
  # powerFactor=7, activeEnergy=8, frequency=23) — pdu.rules selects by number.
  # Human labels: inletLabel ("I1"), inletName, pduName. inletRatedCurrent
  # ("24A") is regex-extracted to a numeric amp rating so load% works
  # cross-vendor.
  pdu_raritan:
    walk:
      - pduName                       # 13742.6.3.2.2.1.13  (unit name)
      - inletLabel                    # 13742.6.3.3.3.1.2   (faceplate label)
      - inletName                     # 13742.6.3.3.3.1.3   (human label)
      - inletRatedCurrent             # 13742.6.3.3.3.1.7   ("24A" -> amps)
      - measurementsInletSensorValue  # 13742.6.5.2.3.1.4   (reading)
      - measurementsInletSensorState  # 13742.6.5.2.3.1.3   (enum)
      - inletSensorDecimalDigits      # 13742.6.3.3.4.1.7   (scale exponent)
      - inletSensorUnits              # 13742.6.3.3.4.1.6   (unit enum)
      # Per-outlet: PX3 meters each outlet. outletLabel ("1".."20") is the human
      # id; measurementsOutletSensorValue is indexed by sensorType like the
      # inlet (1=current …), scaled by outletSensorDecimalDigits. outletName is
      # NOT walked (collides with Sentry3-MIB::outletName); outletLabel is unique.
      - outletLabel                   # 13742.6.3.5.3.1.2   (per-outlet label)
      - measurementsOutletSensorValue # 13742.6.5.4.3.1.4   (per-outlet reading)
      - outletSensorDecimalDigits     # 13742.6.3.5.4.1.7   (per-outlet scale)
    lookups:
      - source_indexes: [pduId, inletId]
        lookup: inletName
      - source_indexes: [pduId, inletId]
        lookup: inletLabel
      - source_indexes: [pduId]
        lookup: pduName
      - source_indexes: [pduId, outletId]
        lookup: outletLabel
    overrides:
      pduName: {type: DisplayString}
      inletLabel: {type: DisplayString}
      inletName: {type: DisplayString}
      inletSensorUnits: {type: EnumAsInfo}
      measurementsInletSensorState: {type: EnumAsInfo}
      outletLabel: {type: DisplayString}
      inletRatedCurrent:
        # "24A" -> gauge 24 (rated amps), for capacity/load% headroom
        regex_extracts:
          Amps:
            - regex: '([0-9]+).*'
              value: '$1'
