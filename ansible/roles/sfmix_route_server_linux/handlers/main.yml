---
- name: Reload bird
  become: true
  ansible.builtin.systemd_service:
    state: reloaded
    daemon_reload: true
    name: bird.service

- name: Rebuild birdwatcher docker container
  become: true
  community.docker.docker_image:
    name: birdwatcher
    build:
      path: "{{ sfmix_route_server_linux_birdwatcher_directory }}/repo"
      network: host
    source: build
    tag: "{{ sfmix_route_server_linux_birdwatcher_version | replace('/', '_') }}"
    force_source: true
  notify: Remove birdwatcher container

- name: Remove birdwatcher container
  become: true
  community.docker.docker_container:
    name: birdwatcher
    state: absent

- name: Restart birdwatcher
  become: true
  community.docker.docker_container:
    name: birdwatcher
    restart: true
    state: started

- name: Rebuild bird_exporter docker container
  become: true
  community.docker.docker_image:
    name: bird_exporter
    build:
      path: "{{ sfmix_route_server_linux_bird_exporter_directory }}/repo"
      network: host
    source: build
    tag: "{{ sfmix_route_server_linux_bird_exporter_version | replace('/', '_') }}"
    force_source: true
  notify: Remove bird_exporter container

- name: Remove bird_exporter container
  become: true
  community.docker.docker_container:
    name: bird_exporter
    state: absent

- name: Restart bird_exporter
  become: true
  community.docker.docker_container:
    name: bird_exporter
    restart: true
    state: started

- name: Rebuild lg-neighborhood-watch docker container
  become: true
  community.docker.docker_image:
    name: lg-neighborhood-watch
    build:
      path: "{{ sfmix_route_server_linux_lg_neighborhood_watch_directory }}/repo"
      dockerfile: lg-neighborhood-watch/Dockerfile
      network: host
    source: build
    tag: "{{ sfmix_route_server_linux_lg_neighborhood_watch_version | replace('/', '_') }}"
    force_source: true
  notify: Remove lg-neighborhood-watch container

- name: Remove lg-neighborhood-watch container
  become: true
  community.docker.docker_container:
    name: lg-neighborhood-watch
    state: absent

- name: Restart lg-neighborhood-watch
  become: true
  community.docker.docker_container:
    name: lg-neighborhood-watch
    restart: true
    state: started
