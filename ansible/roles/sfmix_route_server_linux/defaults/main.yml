---
sfmix_route_server_linux_birdwatcher_directory: "/opt/birdwatcher"
sfmix_route_server_linux_birdwatcher_repo: "https://github.com/alice-lg/birdwatcher"
sfmix_route_server_linux_birdwatcher_version: "master"
# birdwatcher serves a ~1.1M-route RIB; the parsed master table is cached live as
# nested Go maps (~512MiB working set) that dwarf the 3MB JSON response. With the
# old 768m cap, Go's default GC pacing (GOGC=100) tried to grow the heap to ~2x the
# live set (~1GiB) before collecting and hit the cgroup limit first -> memcg OOM-kill
# (exit 137) every ~8 min. Fix is NOT a bigger host: cap stays a HARD ceiling that
# contains birdwatcher so it can never trigger a global OOM and threaten bird. We
# just lift it enough for the GC to breathe and set GOMEMLIMIT below it so the Go
# runtime self-throttles (trades CPU for memory) instead of being killed. GOMEMLIMIT
# keeps *steady* usage modest (~565-690MiB sawtooth observed), but alice-lg poll
# bursts parse the full master table as a live allocation that briefly blows past
# the soft limit to ~1GiB (live, un-GC-able mid-request); a 1024m cap left zero
# headroom at that peak, so the hard cap is 1280m to absorb the spike with margin.
# Worst case host use: bird (~407MiB) + birdwatcher (1280m) + OS << 3.8GiB.
sfmix_route_server_linux_birdwatcher_memory_limit: "1280m"
sfmix_route_server_linux_birdwatcher_gomemlimit: "896MiB"
sfmix_route_server_linux_birdwatcher_cpus_limit: 2
# Make birdwatcher the first OOM victim if the host ever hits global memory
# pressure, so bird (mission-critical) is never the one killed.
sfmix_route_server_linux_birdwatcher_oom_score_adj: 1000
sfmix_route_server_linux_rtr_hostname: 192.33.255.13 # rpki-linux.sfmix.org
sfmix_route_server_linux_rtr_port: 3323
sfmix_route_server_linux_bird_exporter_repo: https://github.com/czerwonk/bird_exporter.git
sfmix_route_server_linux_bird_exporter_directory: /opt/bird_exporter
sfmix_route_server_linux_bird_exporter_version: b7ff18f9e130fef48ef8731b303867742fd17f22
sfmix_route_server_linux_bird_exporter_port: 9324

# lg-neighborhood-watch — passive ARP/NDP sensor. Built locally as a static
# musl binary and copied to the host (NEVER built on rs-linux), run under systemd
# with only CAP_NET_RAW. Mirrors the looking_glass role's local-build model.
sfmix_route_server_linux_lg_neighborhood_watch_local_build: true
sfmix_route_server_linux_lg_neighborhood_watch_src: "{{ playbook_dir }}/../looking-glass"
sfmix_route_server_linux_lg_neighborhood_watch_bin_dir: "{{ sfmix_route_server_linux_lg_neighborhood_watch_src }}/target/x86_64-unknown-linux-musl/release"
sfmix_route_server_linux_lg_neighborhood_watch_user: neighwatch
# HTTP query/metrics interface. Bound to the mgmt IP so lg-server can poll it.
sfmix_route_server_linux_lg_neighborhood_watch_bind: "127.0.0.1:29185"
# Peering-LAN interface(s) to capture on. On rs-linux the IX fabric is untagged
# directly on ens19 (206.197.187.0/24 + 2001:504:30::/64).
sfmix_route_server_linux_lg_neighborhood_watch_interfaces:
  - ens19
# lg-server RPC endpoint the sensor fetches IX IP assignments from.
sfmix_route_server_linux_lg_neighborhood_watch_lg_rpc_url: "http://localhost:9090"
# Shared RPC secret (override via vault/group_vars; must match lg-server's).
sfmix_route_server_linux_lg_neighborhood_watch_rpc_secret: ""
sfmix_route_server_linux_lg_neighborhood_watch_lg_poll_interval_secs: 300
sfmix_route_server_linux_lg_neighborhood_watch_solicit_interval_secs: 60
