---
- name: Tear down existing Akvorado stack
  become: true
  community.docker.docker_compose_v2:
    project_src: "{{ akvorado_install_dir }}"
    state: absent
    remove_orphans: true
  ignore_errors: true

- name: Start Akvorado stack
  become: true
  community.docker.docker_compose_v2:
    project_src: "{{ akvorado_install_dir }}"
    state: present
    pull: always
  register: akvorado_compose_result

