    <path d="M62 116 C 58 86, 60 60, 70 42 C 68 70, 72 96, 74 116 Z"/>
    <path d="M84 116 C 82 90, 84 66, 94 50 C 90 74, 94 98, 96 116 Z"/>
    <path d="M50 116 C 48 92, 52 70, 60 56 C 58 78, 60 98, 62 116 Z"/>
