<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:title" content="{{ .Title }}">
  <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ .Permalink }}">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | SFMIX{{ end }}</title>
  <link rel="icon" type="image/png" sizes="32x32" href="{{ "img/favicon-32x32.png" | relURL }}">
  <link rel="icon" type="image/png" sizes="192x192" href="{{ "img/favicon-192x192.png" | relURL }}">
  <link rel="apple-touch-icon" href="{{ "img/apple-touch-icon.png" | relURL }}">
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
</head>
<body>
  {{- partial "nav.html" . -}}

  <main>
    {{- block "main" . }}{{- end }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; {{ now.Year }} {{ .Site.Params.copyright_name }}</p>
    </div>
  </footer>
</body>
</html>
