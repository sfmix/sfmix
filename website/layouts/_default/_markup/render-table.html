<table>
  <caption class="sr-only">{{ with index (index .THead 0) 0 }}{{ .Text }}{{ end }} data table</caption>
  <thead>
    {{- range .THead }}
    <tr>
      {{- range . }}
      <th scope="col"
        {{- with .Alignment }} {{ printf " style=%q" (printf "text-align: %s" .) | safeHTMLAttr }}{{ end -}}
      >{{ .Text }}</th>
      {{- end }}
    </tr>
    {{- end }}
  </thead>
  <tbody>
    {{- range .TBody }}
    <tr>
      {{- range . }}
      <td
        {{- with .Alignment }} {{ printf " style=%q" (printf "text-align: %s" .) | safeHTMLAttr }}{{ end -}}
      >{{ .Text }}</td>
      {{- end }}
    </tr>
    {{- end }}
  </tbody>
</table>
