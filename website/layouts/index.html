{{ define "main" }}
<section class="hero">
  <!--
    Background video: AdobeStock_190307308 (licensed via sfmix.org WordPress site)
    Mobile fallback image: "Sutro Tower" by Marc Liyanage
      https://www.flickr.com/photos/liyanage/5584629572/
      License: CC BY-SA 2.0 (https://creativecommons.org/licenses/by-sa/2.0/)
  -->
  <video class="hero-video" autoplay muted loop playsinline>
    <source src="{{ "video/hero-bg.mp4" | relURL }}" type="video/mp4">
  </video>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <h1>San Francisco Metropolitan Internet eXchange</h1>
    <img src="{{ "img/sfmix-logo-large.png" | relURL }}" alt="SFMIX" class="hero-logo">
    <p class="tagline">{{ .Site.Params.tagline }}</p>
  </div>
</section>
{{ end }}
