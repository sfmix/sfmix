name: Looking Glass Release

on:
  push:
    tags:
      - 'looking-glass-v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: looking-glass
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#looking-glass-v}" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build release binaries
        run: cargo build --workspace --release --target x86_64-unknown-linux-musl

      - name: Rename binaries
        run: |
          cd target/x86_64-unknown-linux-musl/release
          cp looking-glass ../../../looking-glass-linux-amd64
          cp lg-server ../../../lg-server-linux-amd64
          cp lg-cli ../../../lg-cli-linux-amd64
          cp lg-http ../../../lg-http-linux-amd64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "looking-glass v${{ steps.version.outputs.version }}"
          files: |
            looking-glass/looking-glass-linux-amd64
            looking-glass/lg-server-linux-amd64
            looking-glass/lg-cli-linux-amd64
            looking-glass/lg-http-linux-amd64
          generate_release_notes: true
